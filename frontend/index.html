<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0812a0; 
            font-family: Arial, sans-serif;
        }

        .loader-container {
            text-align: center;
        }

        
        .logo {
            width: 120px; 
            margin-bottom: 30px;
        }

        /* Animação de círculos girando */
        .spinner {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .spinner div {
            width: 20px;
            height: 20px;
            background-color: #cf7e04;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .spinner div:nth-child(1) { animation-delay: 0s; }
        .spinner div:nth-child(2) { animation-delay: 0.2s; }
        .spinner div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        p {
            margin-top: 20px;
            font-size: 16px;
            color: #ffffff;
        }

        h1{
            color: white;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <!-- Coloque aqui sua logo -->
       <h1> Isaac Masakidi</h1>
        <!-- Animação de carregamento -->
        <div class="spinner">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <p>Carregando...</p>
    </div>

    <script>
        // Tempo de carregamento (milissegundos)
        let tempoCarregamento = 5000; // 3 segundos

        setTimeout(() => {
            // Substitua pelo link da página que deseja abrir
            window.location.href = "login.html";
        }, tempoCarregamento);
    </script>
</body>
</html>
