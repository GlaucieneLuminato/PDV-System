<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Login | Isaac Masakidi </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="file/WhatsApp Image 2026-02-25 at 15.38.41.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <!-- Está aqui o codigo Glauce -->
            <h1> </h1>
            <p></p>
        </div>

        <div class="right-panel">
            <div class="login-box">
                 
                <h2>Acessar o sistema</h2>

          <form onsubmit="fazerLogin(event)">
    <div class="field">
        <label>Usuário</label>
        <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="usuario" name="usuario" placeholder="Usuário" required>
        </div>
    </div>

    <div class="field">
        <label>Senha</label>
        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="senha" name="senha" name="senha" autocomplete="current-password" placeholder="Senha" required>
        </div>
    </div>

    <button type="submit" class="login-btn">
        <i class="fas fa-right-to-bracket"></i> Entrar
    </button>
</form>

<script>
async function fazerLogin(event){
    event.preventDefault();

    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    try{
        const resposta = await fetch("https://pdv-system-c359.onrender.com/api/login/", {
            method: "POST",
            headers:{
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: usuario,
                password: senha
            })
        });

        const data = await resposta.json();

        if(!resposta.ok){
            alert("Usuário ou senha inválidos");
            return;
        }

       
        localStorage.setItem("access", data.access);
        localStorage.setItem("refresh", data.refresh);

        console.log("TOKEN:", data.access);

      
        const userResponse = await fetch("https://pdv-system-c359.onrender.com/api/users/me/", {
            headers: {
                "Authorization": `Bearer ${data.access}`
            }
        });
        const userData = await userResponse.json();
        localStorage.setItem("tipo", userData.tipo);

        console.log("USER:", userData);

       
        if(userData.tipo === "admin"){
            window.location.href = "./admin.html";
        } else {
            window.location.href = "./dashboard.html";
        }

    }catch(error){
        console.error("Erro no login:", error);
    }
}
 
</script>


</body>
</html>
